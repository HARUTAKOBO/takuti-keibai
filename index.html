<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>宅地競売ツール</title>
  <style>
    body {
      font-family: "Hiragino Maru Gothic ProN", "Arial", sans-serif;
      background: linear-gradient(135deg, #ffe0ec, #e0f7ff);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 350px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      text-align: center;
    }

    h2 {
      color: #ff6fa5;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #ff6fa5;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff4f90;
    }

    .result {
      margin-top: 20px;
      font-size: 20px;
      color: #333;
      font-weight: bold;
    }

    .sub {
      font-size: 12px;
      color: #888;
      margin-top: 10px;
    }

    .copyright {
      margin-top: 25px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>🏠 宅地競売ツール</h2>

  <label>総資産を入力</label>
  <input type="number" id="asset" placeholder="例：100000">

  <button onclick="calc()">計算する</button>

  <div class="result" id="result"></div>
  <div class="sub">※ Excelの計算式を完全再現</div>

  <div class="copyright">
    © 2026 雲外蒼天 All Rights Reserved.
  </div>
</div>

<script>
function calc() {
  const a = Number(document.getElementById("asset").value);

  if (!a || a <= 0) {
    alert("正しい値を入力してね！");
    return;
  }

  let base = 100 * Math.pow(a, 0.25);

  let result;

  if (base < 10000) {
    result = Math.floor(base / 10) * 10;
  } else {
    result = Math.floor(base / 100) * 100;
  }

  document.getElementById("result").innerText =
    "✨ 推奨入札値：" + result.toLocaleString();
}
</script>

</body>
</html>
