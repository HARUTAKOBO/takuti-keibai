<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>宅地競売ツール</title>
  <style>
    body {
      font-family: "Hiragino Maru Gothic ProN", sans-serif;
      background: linear-gradient(135deg, #ffe0ec, #e0f7ff);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 360px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      text-align: center;
    }

    h2 {
      color: #ff6fa5;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 16px;
    }

    .preview {
      font-size: 14px;
      color: #888;
      margin-top: 5px;
    }

    .result {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
    }

    .copyright {
      margin-top: 20px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>🏠 宅地競売ツール</h2>

  <label>総資産 → 入札値</label>
  <input type="number" id="asset" placeholder="総資産" oninput="calcFromAsset()">
  <div class="preview" id="assetPreview"></div>
  <div class="result" id="result1">---</div>

  <hr style="margin:20px 0;">

  <label>入札値 → 必要総資産</label>
  <input type="number" id="bid" placeholder="入札金額" oninput="calcFromBid()">
  <div class="preview" id="bidPreview"></div>
  <div class="result" id="result2">---</div>

  <div class="copyright">
    © 2026 青銅S9⛅雲外蒼天 All Rights Reserved.
  </div>
</div>

<script>
// 日本語の単位変換（万・億）
function formatJP(num) {
  if (num >= 100000000) {
    return (num / 100000000).toFixed(2).replace(/\.00$/, "") + "億";
  } else if (num >= 10000) {
    return (num / 10000).toFixed(2).replace(/\.00$/, "") + "万";
  } else {
    return num.toLocaleString();
  }
}

function calcValue(a) {
  let base = 100 * Math.pow(a, 0.25);
  if (base < 10000) {
    return Math.floor(base / 10) * 10;
  } else {
    return Math.floor(base / 100) * 100;
  }
}

// 総資産 → 入札値
function calcFromAsset() {
  const a = Number(document.getElementById("asset").value);

  document.getElementById("assetPreview").innerText =
    a ? "👉 " + formatJP(a) : "";

  if (!a || a <= 0) {
    document.getElementById("result1").innerText = "---";
    return;
  }

  const result = calcValue(a);

  document.getElementById("result1").innerText =
    "想定入札値：" + formatJP(result);
}

// 入札値 → 必要総資産
function calcFromBid() {
  const target = Number(document.getElementById("bid").value);

  document.getElementById("bidPreview").innerText =
    target ? "👉 " + formatJP(target) : "";

  if (!target || target <= 0) {
    document.getElementById("result2").innerText = "---";
    return;
  }

  let start = Math.pow(target / 100, 4) * 0.8;
  let end = start * 1.5;

  let a = Math.floor(start);
  let found = null;

  while (a <= end) {
    if (calcValue(a) >= target) {
      found = a;
      break;
    }
    a += 1000;
  }

  if (found) {
    document.getElementById("result2").innerText =
      "必要総資産：約 " + formatJP(found);
  } else {
    document.getElementById("result2").innerText =
      "見つかりません（範囲外）";
  }
}
</script>

</body>
</html>
